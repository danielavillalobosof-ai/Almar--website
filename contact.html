<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee5b2b",
                        "background-light": "#fcf9f8",
                        "background-dark": "#221510",
                        "sand": "#e7d5cf",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "serif": ["Instrument Serif", "serif"]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900">
    <header class="flex items-center justify-between border-b border-sand dark:border-white/10 px-6 lg:px-20 py-4 sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-50">
        <div class="flex items-center gap-4">
            <div class="size-6 text-primary"><span class="material-symbols-outlined text-3xl">spa</span></div>
            <h2 class="text-xl font-bold tracking-widest">ALMARE</h2>
        </div>
        <nav class="hidden md:flex flex-1 justify-center gap-8">
            <a class="text-sm font-medium hover:text-primary transition-colors" href="index.html">Home</a>
            <a class="text-sm font-medium hover:text-primary transition-colors" href="philosophy.html">Philosophy</a>
            <a class="text-sm font-bold text-primary" href="contact.html">Contact</a>
        </nav>
        <button class="bg-primary text-white px-6 py-2 rounded-full text-sm font-bold">Book Now</button>
    </header>

    <main class="px-6 md:px-20 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-start">
            <div class="space-y-8">
                <h1 class="text-5xl font-serif italic">Get in Touch</h1>
                <p class="text-slate-600">Reach out to our concierge for bespoke bookings and inquiries.</p>
                <div class="space-y-4">
                    <div class="flex items-center gap-4">
                        <span class="material-symbols-outlined text-primary">location_on</span>
                        <span>Menorca, Spain</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="material-symbols-outlined text-primary">mail</span>
                        <span>hello@almare-menorca.com</span>
                    </div>
                </div>
            </div>
            
            <div class="bg-white p-8 rounded-xl shadow-sm border border-sand">
                <form class="space-y-6">
                    <input type="text" placeholder="Full Name" class="w-full border-b border-sand py-2 focus:border-primary outline-none">
                    <input type="email" placeholder="Email Address" class="w-full border-b border-sand py-2 focus:border-primary outline-none">
                    <textarea placeholder="Your Message" rows="4" class="w-full border-b border-sand py-2 focus:border-primary outline-none"></textarea>
                    <button class="w-full bg-primary text-white py-4 rounded-full font-bold uppercase tracking-widest">Send Inquiry</button>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
