<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Contact | ALMARE</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = { theme: { extend: { colors: { "primary": "#ee5b2b", "background": "#fcf9f8", "dark": "#221510", "sand": "#e7d5cf", "stone": "#9a5f4c" }, fontFamily: { "display": ["Manrope", "sans-serif"], "serif": ["Instrument Serif", "serif"] } } } }
    </script>
</head>
<body class="bg-background font-display text-dark">
    <header class="flex items-center justify-between border-b border-sand/50 px-6 lg:px-20 py-6 sticky top-0 bg-background/90 backdrop-blur-md z-50">
        <div class="flex items-center gap-3"><span class="material-symbols-outlined text-primary text-3xl">spa</span><h2 class="text-2xl font-bold tracking-[0.2em]">ALMARE</h2></div>
        <nav class="hidden md:flex gap-12 text-xs uppercase tracking-widest font-semibold">
            <a class="hover:text-primary transition-colors" href="index.html">Home</a>
            <a class="hover:text-primary transition-colors" href="philosophy.html">Philosophy</a>
            <a class="hover:text-primary transition-colors" href="rituals.html">Rituals</a>
            <a class="text-primary" href="contact.html">Contact</a>
        </nav>
        <button class="bg-dark text-white px-8 py-3 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-primary transition-all">Book Now</button>
    </header>
    <main class="py-24 px-6 md:px-20 max-w-xl mx-auto">
        <h1 class="text-6xl font-serif italic mb-8">Get in touch.</h1>
        <form class="space-y-6">
            <input type="text" placeholder="Name" class="w-full border-b border-sand p-3 focus:ring-0 outline-none">
            <button class="w-full bg-dark text-white py-4 rounded-full uppercase tracking-widest font-bold">Send Inquiry</button>
        </form>
    </main>
</body>
</html>
